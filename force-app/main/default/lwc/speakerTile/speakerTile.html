<template>
    <div class="card-container">
        <lightning-card title="Apresentação do Palestrante" icon-name="standard:address_book">
        <div class="slds-p-around_medium slds-text-align_center">
            
            <div class="slds-m-bottom_medium">
                <template if:true={fotoUrl}>
                    <img src={fotoUrl} alt="Foto de Perfil do Palestrante" class="avatar-palestrante"/>
                </template>
                <template if:false={fotoUrl}>
                    <div class="avatar-placeholder slds-align_absolute-center">
                        <lightning-icon icon-name="standard:user" size="large"></lightning-icon>
                    </div>
                </template>
            </div>

            <div class="slds-text-heading_medium slds-m-bottom_small">
                <strong>{nomePalestrante}</strong>
            </div>

            <div class="slds-text-align_left slds-box slds-theme_shade slds-m-top_medium">
                <div class="slds-text-title_caps slds-m-bottom_x-small slds-text-color_weak">Biografia & Especialidade</div>
                <lightning-formatted-rich-text value={biografia}></lightning-formatted-rich-text>
            </div>

        </div>
    </lightning-card>
    </div>
</template>
