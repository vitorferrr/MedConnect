<template>
    <section class="mc-hero" aria-label="Banner de boas-vindas MedConnect">

        <div class="mc-hero__noise" aria-hidden="true"></div>

        <div class="mc-hero__orb mc-hero__orb--1" aria-hidden="true"></div>
        <div class="mc-hero__orb mc-hero__orb--2" aria-hidden="true"></div>
        <div class="mc-hero__orb mc-hero__orb--3" aria-hidden="true"></div>

        <div class="mc-hero__inner">
            <div class="mc-hero__badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L13.5 8.5H20L14.5 12.5L16.5 19L12 15L7.5 19L9.5 12.5L4 8.5H10.5L12 2Z"
                          fill="rgba(255,255,255,0.9)" />
                </svg>
                <span>MedConnect</span>
            </div>
            <h1 class="mc-hero__title">
                Bem-vindo à plataforma<br />
                <em class="mc-hero__title--accent">médica do futuro</em>
            </h1>
            <p class="mc-hero__subtitle">
                Conectamos profissionais de saúde, palestrantes e eventos clínicos
                em um único ecossistema digital seguro e inteligente.
            </p>

            <div class="mc-hero__search-wrap" role="search">
                <div class="mc-hero__search-inner">
                    <svg class="mc-hero__search-icon" viewBox="0 0 24 24" fill="none"
                         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <circle cx="11" cy="11" r="7" stroke="#1A73E8" stroke-width="2"/>
                        <path d="M16.5 16.5L21 21" stroke="#1A73E8" stroke-width="2"
                              stroke-linecap="round"/>
                    </svg>
                    <input
                        class="mc-hero__search-input"
                        type="search"
                        placeholder="Buscar eventos médicos, palestrantes ou especialidades..."
                        value={termoBusca}
                        oninput={handleBusca}
                        onkeydown={handleBuscaKeydown}
                        aria-label="Campo de busca global"
                    />
                    <button class="mc-hero__search-btn" onclick={executarBusca} type="button">
                        Buscar
                    </button>
                </div>

                <div class="mc-hero__search-tags" aria-label="Buscas rápidas sugeridas">
                    <span class="mc-hero__search-tag" onclick={handleTagClick}
                          data-termo="Cardiologia">Cardiologia</span>
                    <span class="mc-hero__search-tag" onclick={handleTagClick}
                          data-termo="Oncologia">Oncologia</span>
                    <span class="mc-hero__search-tag" onclick={handleTagClick}
                          data-termo="Neurologia">Neurologia</span>
                    <span class="mc-hero__search-tag" onclick={handleTagClick}
                          data-termo="Pediatria">Pediatria</span>
                </div>
            </div>

            <div class="mc-hero__slot-area">
                <slot name="hero-actions">
                    <div class="mc-hero__stats" aria-label="Estatísticas da plataforma">
                        <div class="mc-hero__stat">
                            <span class="mc-hero__stat-num"
                                  data-target="248">{contadorEventos}</span>
                            <span class="mc-hero__stat-label">Eventos realizados</span>
                        </div>
                        <div class="mc-hero__stat-divider" aria-hidden="true"></div>
                        <div class="mc-hero__stat">
                            <span class="mc-hero__stat-num"
                                  data-target="1340">{contadorMedicos}</span>
                            <span class="mc-hero__stat-label">Médicos cadastrados</span>
                        </div>
                        <div class="mc-hero__stat-divider" aria-hidden="true"></div>
                        <div class="mc-hero__stat">
                            <span class="mc-hero__stat-num"
                                  data-target="92">{contadorPalestrantes}</span>
                            <span class="mc-hero__stat-label">Palestrantes ativos</span>
                        </div>
                    </div>
                </slot>
            </div>

        </div>

        <div class="mc-hero__wave" aria-hidden="true">
            <svg viewBox="0 0 1440 80" preserveAspectRatio="none"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z"
                      fill="var(--mc-bg-page)"/>
            </svg>
        </div>

    </section>


    <div class="mc-wrapper slds-grid slds-wrap" role="region" aria-label="Área de conteúdo principal">
        <div class="slds-col slds-size_1-of-1 mc-wrapper__col">
            <article class="mc-card mc-card--elevated">

                <template if:true={mostrarCabecalho}>
                    <header class="mc-card__header">
                        <slot name="card-header">
                            <h2 class="mc-card__title">{tituloCard}</h2>
                        </slot>
                        <template if:true={mostrarBadge}>
                            <span class="mc-badge mc-badge--ativo">{textoBadge}</span>
                        </template>
                    </header>
                </template>

                <div class="mc-card__body">
                    <slot>
                        <p class="mc-card__placeholder">
                            Injete conteúdo via slot neste contêiner card.
                        </p>
                    </slot>
                </div>

                <footer class="mc-card__footer">
                    <slot name="card-footer"></slot>
                </footer>

            </article>
        </div>

        <div class="slds-col slds-size_1-of-1 mc-wrapper__grid-area">
            <slot name="cards-grid"></slot>
        </div>

    </div>

</template>
